# version key is obsolete in Compose v2+ — removed to suppress warning

services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - HERMES_CLI_PATH=/usr/local/bin/hermes
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy

